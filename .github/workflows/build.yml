name: Build and release with Parcel

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '25.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build with Parcel
      run: npm run build

    - name: Check for version tag
      id: check_tag
      run: |
        # Finds tags pointing at the current commit that start with 'v'
        TAG=$(git tag --points-at HEAD "v*")
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        if [ -z "$TAG" ]; then
          echo "No 'v' tag found on this commit."
        else
          echo "Found tag: $TAG"
        fi

    - name: Create GitHub Release
      if: steps.check_tag.outputs.tag != ''
      permissions:
        contents: write
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create ${{ steps.check_tag.outputs.tag }} \
            ./dist/* \
            --title="Release ${{ steps.check_tag.outputs.tag }}" \
            --generate-notes

